<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Carleton Digital Exhibit Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    margin:0;
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:#f7f7f7;
}

header{
    text-align:center;
    padding:20px;
    background:#222;
    color:white;
    font-size:28px;
    letter-spacing:1px;
}

#map{
    height:90vh;
    width:100%;
}

.building-marker{
    width:22px;
    height:22px;
    background:#cc0000;
    border-radius:50%;
    border:3px solid white;
    box-shadow:0 0 12px rgba(255,0,0,.8);
    transition:transform .15s ease;
}

.building-marker:hover{
    transform:scale(1.4);
}

</style>

</head>

<body>

<header>
Carleton Digital Exhibit Map - Click on any point to learn more information!
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ---------- MAP SETUP ---------- */

const map = L.map('map').setView([44.4609,-93.1536],16);


/* ---------- MAP STYLES ---------- */
const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    attribution:'Tiles © Esri'
});

const street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
});

const minimal = L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
    attribution:'© OpenStreetMap © CARTO'
});



/* default map */

satellite.addTo(map);


/* ---------- LAYER TOGGLE ---------- */

const baseMaps = {
  "Satellite": satellite,  
  "Minimal Map": minimal,
    "Street Map": street,
};

L.control.layers(baseMaps).addTo(map);


/* ---------- MARKER FUNCTION ---------- */

function buildingMarker(coords,name,link){

    const icon = L.divIcon({
        className:"",
        html:`<div class="building-marker"></div>`,
        iconSize:[22,22],
        iconAnchor:[11,11]
    });

    const marker = L.marker(coords,{icon}).addTo(map);

    marker.bindTooltip(name,{direction:"top",offset:[0,-10]});

    marker.on("click",()=>{
        window.location.href = link;
    });
}


/* ---------- BUILDINGS ---------- */

buildingMarker(
[44.460262939525215, -93.15473482867172],
"Skinner Memorial Chapel",
"chapel.html"
);

buildingMarker(
[44.46185860255292, -93.152498539017],
"Goodsell Observatory",
"goodsell.html"
);

buildingMarker(
[44.46170188760823, -93.15247701351274],
"Olin Hall",
"olin.html"
);

buildingMarker(
[44.459367438472945, -93.15030219191526],
"Watson Hall",
"watson.html"
);

buildingMarker(
[44.4613330197778, -93.1560663187699],
"Sayles-Hill Campus Center",
"sayles.html"
);

buildingMarker(
[44.46290987965156, -93.15677672324976],
"West Gym",
"west-gym.html"
);

buildingMarker(
[44.46248347367986, -93.15282684776545],
"Boliou Hall",
"boliou.html"
);

</script>

</body>
</html>
